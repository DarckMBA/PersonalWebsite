<!DOCTYPE html>
<html lang="en">
<head>
    <title>Marc's Website</title>
    <meta name="author" content="Marc Baleiron">
    <meta name="description" content="Aplicación web para localizar cargadores de coche">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css" />
</head>
<body>
    <section class="header">
        <div class="spacer waves1"></div>

        <div class="background-slider" style="
            --width: 120px;
            --height: 50px;
            --quantity: 5;
        ">
            <div class="list">
                <div class="item" style="--position: 1"><p>Hello!</p></div>
                <div class="item" style="--position: 2"><p>Olá!</p></div>
                <div class="item" style="--position: 3"><p>こんにちは！</p></div>
                <div class="item" style="--position: 4"><p>Hola!</p></div>
                <div class="item" style="--position: 5"><p>Bonjour!</p></div>
            </div>
        </div>

        <div class="section-selector">
            <button class="about-me" type="button" tabindex="1">About me</button>
            <button class="projects" type="button" tabindex="2">Projects</button>
            <button class="contact" type="button" tabindex="3">Contact</button>
        </div>
    </section>

    <section class="modals">
        
    </section>
</body>
</html>
